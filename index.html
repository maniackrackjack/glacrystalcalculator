<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Moved</title>

  <!-- Auto redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5; url=https://maniackrackjack.github.io/labophase/">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 50px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .image img {
      width: 180px;
      animation: float 3s ease-in-out infinite;
    }

    .text {
      max-width: 500px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00eaff, #00ffcc, #00eaff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 3s linear infinite, glow 1.5s ease-in-out infinite alternate;
    }

    .lang-block {
      margin-bottom: 20px;
    }

    .lang-title {
      font-weight: bold;
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    p {
      font-size: 1.1rem;
      margin: 5px 0;
    }

    a {
      color: #00eaff;
      font-weight: bold;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: 0.3s;
    }

    a:hover {
      border-bottom: 2px solid #00eaff;
    }

    /* Animations */
    @keyframes glow {
      from { text-shadow: 0 0 10px #00eaff; }
      to { text-shadow: 0 0 25px #00ffff; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes gradientMove {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    /* Mobile */
    @media (max-width: 650px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .image img {
        width: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="image">
      <img src="./vegapunk.png" alt="Moved">
    </div>

    <div class="text">
      <h1>🚨 Page Moved / Página Movida</h1>

      <div class="lang-block">
        <div class="lang-title">🇺🇸 English</div>
        <p>This page or service has moved to a new location.</p>
        <p>You will be redirected automatically.</p>
      </div>

      <div class="lang-block">
        <div class="lang-title">🇧🇷 Português</div>
        <p>Esta página ou serviço foi movido para um novo endereço.</p>
        <p>Você será redirecionado automaticamente.</p>
      </div>

      <p>
        👉 <a href="https://maniackrackjack.github.io/labophase/">
          Go to new page / Ir para a nova página
        </a>
      </p>

    </div>
  </div>
</body>
</html>
