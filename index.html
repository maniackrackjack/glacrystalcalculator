<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Tibia Crystal Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Menu</h2>

<button class="tabBtn active" onclick="switchTab('calc',this)">
Calculadora
</button>

<button class="tabBtn" onclick="switchTab('tables',this)">
Tabelas
</button>

</div>

<div class="content">

<div id="calc">

<div class="panel">

<h3>Crystal Calculator</h3>

<div class="grid">

<div class="itemBtn" onclick="addItem('chapeu')">
<img src="icons/chapeu.png"><br>Chapéu
</div>

<div class="itemBtn" onclick="addItem('camisa')">
<img src="icons/camisa.png"><br>Camisa
</div>

<div class="itemBtn" onclick="addItem('calca')">
<img src="icons/calca.png"><br>Calça
</div>

<div class="itemBtn" onclick="addItem('sabre')">
<img src="icons/sabre.png"><br>Arma
</div>

<div class="itemBtn" onclick="addItem('colar')">
<img src="icons/colar.png"><br>Colar
</div>

<div class="itemBtn" onclick="addItem('emblema')">
<img src="icons/emblema.png"><br>Emblema
</div>

<div class="itemBtn" onclick="addItem('anel')">
<img src="icons/anel.png"><br>Anel
</div>

</div>

<div class="buttons">

<button class="setBtn" onclick="addFullSet()">
Adicionar Set Completo
</button>

<button class="clearBtn" onclick="clearBuild()">
Limpar
</button>

</div>

<div id="itemsArea"></div>

<div id="summary">
Cristais totais necessários: 0
</div>

</div>

</div>


<div id="tables" style="display:none">

<div class="panel">

<h3>Tabelas de Combinação</h3>

<div id="tablesArea"></div>

</div>

</div>

</div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
